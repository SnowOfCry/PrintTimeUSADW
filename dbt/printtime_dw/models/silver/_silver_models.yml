version: 2

# =============================================================================
# _silver_models.yml
# dbt model contracts for the silver layer. Each contract enforces the exact
# shape of sql/silver/002_create_silver_tables.sql: column names, data types,
# NOT NULL constraints, and the primary key. Columns are listed in QUERY order
# (the order the model's SELECT emits them), so silver_row_hash is always last.
#
# Every silver table shares the same NOT NULL set from the DDL spec:
#   <business key>, silver_source_system, silver_batch_id,
#   silver_created_at_timestamp, silver_updated_at_timestamp,
#   silver_is_deleted_flag, silver_row_hash.
# Add one model block per .sql file in this folder.
# =============================================================================

models:

  # ── silver.state ───────────────────────────────────────────────────────────
  - name: state
    description: "Clean state lookup (CA, AZ, TX). Feeds gold.dim_customer and gold.dim_store."
    config:
      contract:
        enforced: true
    columns:
      - name: silver_state_code
        data_type: varchar(2)
        constraints:
          - type: not_null
          - type: primary_key

      - name: silver_state_name
        data_type: varchar(50)

      - name: silver_source_system
        data_type: varchar(100)
        constraints:
          - type: not_null

      - name: silver_source_table_name
        data_type: varchar(150)

      - name: silver_source_record_id
        data_type: text

      - name: silver_source_created_at_timestamp
        data_type: timestamp

      - name: silver_source_updated_at_timestamp
        data_type: timestamp

      - name: silver_bronze_record_id
        data_type: bigint

      - name: silver_bronze_batch_id
        data_type: bigint

      - name: silver_batch_id
        data_type: bigint
        constraints:
          - type: not_null

      - name: silver_created_at_timestamp
        data_type: timestamp
        constraints:
          - type: not_null

      - name: silver_updated_at_timestamp
        data_type: timestamp
        constraints:
          - type: not_null

      - name: silver_is_deleted_flag
        data_type: boolean
        constraints:
          - type: not_null

      - name: silver_row_hash
        data_type: text
        constraints:
          - type: not_null

  # ── silver.product ─────────────────────────────────────────────────────────
