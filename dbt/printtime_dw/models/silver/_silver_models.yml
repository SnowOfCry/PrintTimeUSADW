version: 2

# =============================================================================
# _silver_models.yml
# Documents and tests dbt silver-layer models.
# Silver models clean, standardize, and deduplicate bronze source data.
# Add one model block per .sql file you create in this folder.
# =============================================================================

models:

  - name: state
    description: "Clean state lookup (CA, AZ, TX). Feeds gold.dim_customer and gold.dim_store."
    config:
      contract:
        enforced: true
    columns:
      - name: silver_state_code
        data_type: varchar(2)
        constraints:
          - type: not_null
          - type: primary_key

      - name: silver_state_name
        data_type: varchar(50)

      - name: silver_source_system
        data_type: varchar(100)
        constraints:
          - type: not_null
      
      - name: silver_source_table_name
        data_type: varchar(150)
      
      - name: silver_source_record_id
        data_type: text
      
      - name: silver_source_created_at_timestamp
        data_type: timestamp
      
      - name: silver_source_updated_at_timestamp
        data_type: timestamp
      
      - name: silver_bronze_record_id
        data_type: bigint

      - name: silver_bronze_batch_id
        data_type: bigint

      - name: silver_batch_id
        data_type: bigint
        constraints:
          - type: not_null
      
      - name: silver_created_at_timestamp
        data_type: timestamp
      
      - name: silver_updated_at_timestamp
        data_type: timestamp
        
      - name: silver_is_deleted_flag
        data_type: boolean

      - name: silver_row_hash
        data_type: text
        constraints:
          - type: not_null

  - name: product
    description: "Clean current version of each product. Feeds gold.dim_product and product attributes on fact_retail_sales."
    config:
      contract:
        enforced: true
    columns:
      - name: silver_product_id
        data_type: bigint
        constraints:
          - type: not_null
          - type: primary_key

      - name: silver_product_sku
        data_type: varchar(50)

      - name: silver_product_name
        data_type: varchar(255)

      - name: silver_product_description
        data_type: text

      - name: silver_department_id
        data_type: bigint

      - name: silver_category_id
        data_type: bigint

      - name: silver_brand_name
        data_type: varchar(100)

      - name: silver_standard_cost_amount
        data_type: numeric(18,2)

      - name: silver_markup_pct
        data_type: numeric(8,4)

      - name: silver_standard_price_amount
        data_type: numeric(18,2)

      - name: silver_is_local_made_flag
        data_type: boolean
      
      - name: silver_is_active_flag
        data_type: boolean  
      
      - name: silver_source_system
        data_type: varchar(100)
        constraints:
          - type: not_null
      
      - name: silver_source_table_name
        data_type: varchar(150) 

      - name: silver_source_record_id
        data_type: text 
      
      - name: silver_source_created_at_timestamp
        data_type: timestamp 
      
      - name: silver_source_updated_at_timestamp
        data_type: timestamp 
      
      - name: silver_bronze_record_id
        data_type: bigint 
      
      - name: silver_bronze_batch_id
        data_type: bigint

      - name: silver_batch_id
        data_type: bigint
        constraints:
          - type: not_null

      - name: silver_created_at_timestamp
        data_type: timestamp 
      
      - name: silver_updated_at_timestamp
        data_type: timestamp  
      
      - name: silver_is_deleted_flag
        data_type: boolean

      - name: silver_row_hash
        data_type: text
        constraints:
          - type: not_null  

  - name: customer
    description: "Clean current version of each customer. Feeds gold.dim_customer"
    config:
      contract:
        enforced: true
    columns:
      - name: silver_customer_id
        data_type: bigint
        constraints:
          - type: not_null
          - type: primary_key

      - name: silver_customer_account_no
        data_type: varchar(30)

      - name: silver_business_name
        data_type: varchar(255)

      - name: silver_first_name
        data_type: varchar(100)

      - name: silver_last_name
        data_type: varchar(100)

      - name: silver_customer_name
        data_type: varchar(255)

      - name: silver_email
        data_type: varchar(255)

      - name: silver_phone_number
        data_type: varchar(50)

      - name: silver_customer_status
        data_type: varchar(20)

      - name: silver_is_active_flag
        data_type: boolean

      - name: silver_default_tax_rate_id
        data_type: bigint
      
      - name: silver_home_store_id
        data_type: bigint

      - name: silver_first_order_date
        data_type: date

      - name: silver_source_system
        data_type: varchar(100)
        constraints:
          - type: not_null   
      
      - name: silver_source_table_name
        data_type: varchar(150)

      - name: silver_source_record_id
        data_type: text

      - name: silver_source_created_at_timestamp
        data_type: timestamp

      - name: silver_source_updated_at_timestamp
        data_type: timestamp

      - name: silver_bronze_record_id
        data_type: bigint

      - name: silver_bronze_batch_id
        data_type: bigint

      - name: silver_batch_id
        data_type: bigint
        constraints:
          - type: not_null
      
      - name: silver_created_at_timestamp
        data_type: timestamp

      - name: silver_updated_at_timestamp
        data_type: timestamp
      
      - name: silver_is_deleted_flag
        data_type: boolean

      - name: silver_row_hash
        data_type: text
        constraints:
          - type: not_null

  # ── silver.department ──────────────────────────────────────────────────────
  # Clean department lookup (SIGNS, EMB, DTF, PRINT). Feeds gold.dim_product.
  - name: department
    description: "Clean department lookup (SIGNS, EMB, DTF, PRINT). Feeds gold.dim_product."
    config:
      contract:
        enforced: true
    columns:
      - name: silver_department_id
        data_type: bigint
        constraints:
          - type: not_null
          - type: primary_key

      - name: silver_department_code
        data_type: varchar(20)

      - name: silver_department_name
        data_type: varchar(100)

      - name: silver_department_description
        data_type: varchar(200)

      - name: silver_is_active_flag
        data_type: boolean

      - name: silver_source_system
        data_type: varchar(100)
        constraints:
          - type: not_null

      - name: silver_source_table_name
        data_type: varchar(150)

      - name: silver_source_record_id
        data_type: text

      - name: silver_source_created_at_timestamp
        data_type: timestamp

      - name: silver_source_updated_at_timestamp
        data_type: timestamp

      - name: silver_bronze_record_id
        data_type: bigint

      - name: silver_bronze_batch_id
        data_type: bigint

      - name: silver_batch_id
        data_type: bigint
        constraints:
          - type: not_null

      - name: silver_created_at_timestamp
        data_type: timestamp

      - name: silver_updated_at_timestamp
        data_type: timestamp

      - name: silver_is_deleted_flag
        data_type: boolean

      - name: silver_row_hash
        data_type: text
        constraints:
          - type: not_null

