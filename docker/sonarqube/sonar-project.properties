# =============================================================================
# sonar-project.properties
# SonarQube project configuration for PrintTimeUSA ELT Data Warehouse.
# =============================================================================

sonar.projectKey=printtime-usa-dw
sonar.projectName=PrintTimeUSA Data Warehouse
sonar.projectVersion=1.0

# Source code to analyze
sonar.sources=ingestion

# Test directories
sonar.tests=tests

# Language
sonar.language=py

# Python coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions — do not analyze generated/vendor/temp folders
sonar.exclusions=\
    dbt/printtime_dw/target/**,\
    dbt/printtime_dw/dbt_packages/**,\
    dbt/printtime_dw/logs/**,\
    airflow/logs/**,\
    **/__pycache__/**,\
    **/*.pyc,\
    **/.pytest_cache/**,\
    **/node_modules/**,\
    **/venv/**,\
    **/.venv/**,\
    **/dist/**,\
    **/build/**

# Test exclusions (not treated as source)
sonar.test.exclusions=tests/**

# Encoding
sonar.sourceEncoding=UTF-8

# SonarQube server (set at runtime via environment or CI secret)
# sonar.host.url=http://sonarqube:9000
# sonar.login=<YOUR_SONAR_TOKEN>
