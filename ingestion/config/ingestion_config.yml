# =============================================================================
# ingestion_config.yml
# PrintTimeUSA ELT Ingestion Configuration
# Sensitive values (passwords, hosts) should be set via environment variables.
# =============================================================================

# Logical name for this source system
source_name: oltp_printtime

# Default load strategy for tables that don't override it
default_load_strategy: incremental

# Default watermark column name (override per-table as needed)
default_watermark_column: updated_at

# Bronze schema where raw data is loaded
target_schema: bronze

# Tables to include in the ingestion run.
# `name`         = OLTP source table to extract from.
# `bronze_table` = exact Bronze landing table name (matches sql/bronze DDL):
#                  OLTP entities -> bronze.oltp_*, reference data -> bronze.ref_*.
# Small reference/dimension tables are reloaded in full each run.
# Large transactional tables load incrementally on updated_at.
tables:
  # --- Reference / lookup tables (small, full reload) ---
  - name: ref_state
    bronze_table: ref_state
    load_strategy: full_load
  - name: ref_invoice_status
    bronze_table: ref_invoice_status
    load_strategy: full_load
  - name: ref_payment_status
    bronze_table: ref_payment_status
    load_strategy: full_load
  - name: payment_method
    bronze_table: ref_payment_method
    load_strategy: full_load
  - name: payment_type
    bronze_table: ref_payment_type
    load_strategy: full_load
  - name: tax_rate
    bronze_table: ref_tax_rate
    load_strategy: full_load

  # --- Dimension-like tables (full reload; modest size) ---
  - name: store
    bronze_table: oltp_store
    load_strategy: full_load
  - name: department
    bronze_table: oltp_department
    load_strategy: full_load
  - name: product_category
    bronze_table: oltp_product_category
    load_strategy: full_load
  - name: employee
    bronze_table: oltp_employee
    load_strategy: full_load
  - name: product
    bronze_table: oltp_product
    load_strategy: full_load

  # --- Customer data (incremental) ---
  - name: customer
    bronze_table: oltp_customer
    watermark_column: updated_at
    load_strategy: incremental
  - name: customer_address
    bronze_table: oltp_customer_address
    watermark_column: updated_at
    load_strategy: incremental
  - name: customer_status_history
    bronze_table: oltp_customer_status_history
    watermark_column: changed_at
    load_strategy: incremental

  # --- Transactional tables (incremental) ---
  - name: invoice
    bronze_table: oltp_invoice
    watermark_column: updated_at
    load_strategy: incremental
  - name: invoice_line
    bronze_table: oltp_invoice_line
    watermark_column: updated_at
    load_strategy: incremental
  - name: invoice_status_history
    bronze_table: oltp_invoice_status_history
    watermark_column: changed_at
    load_strategy: incremental
  - name: payment
    bronze_table: oltp_payment
    watermark_column: updated_at
    load_strategy: incremental
  - name: refund
    bronze_table: oltp_refund
    watermark_column: updated_at
    load_strategy: incremental
  - name: invoice_adjustment
    bronze_table: oltp_invoice_adjustment
    watermark_column: updated_at
    load_strategy: incremental
