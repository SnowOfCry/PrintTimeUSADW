version: 2

# =============================================================================
# _gold_models.yml
# dbt model contracts + tests for the gold (Kimball star-schema) layer.
# Each contract enforces the exact shape of sql/gold/002_create_gold_tables.sql:
# column names, data types, NOT NULL constraints, and the primary key.
# Columns are listed in the order the model's SELECT emits them.
# Add one model block per .sql file in this folder.
# =============================================================================

models:

  # ── gold.dim_date (Type 0 — generated calendar) ─────────────────────────────
  - name: dim_date
    description: "Conformed calendar dimension (YYYYMMDD smart key). Generated 2020-2030 + a -1 Not Provided member. Referenced directly and via role-playing date views (ADR-010)."
    config:
      contract:
        enforced: true
    columns:
      - name: date_key
        data_type: integer
        constraints:
          - type: not_null
          - type: primary_key
        data_tests:
          - unique
          - not_null

      - name: date
        data_type: date
        constraints:
          - type: not_null

      - name: full_date_description
        data_type: varchar(50)

      - name: day_of_week
        data_type: varchar(10)

      - name: day_number_in_calendar_month
        data_type: smallint

      - name: last_day_in_month_indicator
        data_type: varchar(3)

      - name: calendar_week_ending_date
        data_type: date

      - name: calendar_month_name
        data_type: varchar(10)

      - name: calendar_month_number_in_year
        data_type: smallint

      - name: calendar_quarter
        data_type: smallint

      - name: calendar_year_quarter
        data_type: varchar(7)

      - name: calendar_year
        data_type: smallint

      - name: calendar_year_month
        data_type: varchar(7)

      - name: holiday_indicator
        data_type: varchar(20)
        data_tests:
          - not_null

      - name: weekday_indicator
        data_type: varchar(10)
        data_tests:
          - accepted_values:
              values: ['Weekday', 'Weekend', 'Unknown']

      - name: etl_load_timestamp
        data_type: timestamp
        constraints:
          - type: not_null

      - name: etl_updated_timestamp
        data_type: timestamp
        constraints:
          - type: not_null

  # ── gold.dim_payment_type (Type 1 — overwrite) ─────────────────────────────
  - name: dim_payment_type
    description: "Payment-type dimension (Type 1 overwrite-in-place). Feeds gold.fact_payments. dbt-managed integer surrogate key; -1 Not Provided member."
    config:
      contract:
        enforced: true
    columns:
      - name: payment_type_key
        data_type: integer
        constraints:
          - type: not_null
          - type: primary_key
        data_tests:
          - unique
          - not_null

      - name: type_code
        data_type: varchar(20)
        constraints:
          - type: not_null
        data_tests:
          - accepted_values:
              values: ['DEPOSIT', 'BALANCE', 'FULL', 'REFUND', 'ADJUSTMENT', 'Not Provided']

      - name: type_name
        data_type: varchar(50)

      - name: description
        data_type: varchar(200)

      - name: etl_load_timestamp
        data_type: timestamp
        constraints:
          - type: not_null

      - name: etl_updated_timestamp
        data_type: timestamp
        constraints:
          - type: not_null

      - name: is_deleted
        data_type: boolean
        constraints:
          - type: not_null
