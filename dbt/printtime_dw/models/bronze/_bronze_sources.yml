version: 2

# =============================================================================
# _bronze_sources.yml
# Declares dbt sources that point to raw tables written by Python ingestion.
# Add one entry per OLTP table you load into bronze.
# =============================================================================

sources:
  - name: bronze
    description: >
      Raw data loaded by Python ingestion directly from OLTP source systems.
      No business transformations have been applied. dbt reads from here to
      build silver models.
    schema: bronze
    database: "{{ env_var('DBT_DATABASE', 'printtime_dw') }}"

    # Source freshness checks (optional — enable once tables exist)
    # freshness:
    #   warn_after:  {count: 6,  period: hour}
    #   error_after: {count: 24, period: hour}
    # loaded_at_field: _loaded_at

    tables:
      # ── Placeholder: replace with your real OLTP tables ──────────────────
      - name: raw_orders
        description: "Raw orders extracted from the OLTP source."
        # loaded_at_field: _loaded_at
        columns:
          - name: order_id
            description: "Natural key from OLTP source."
            tests:
              - not_null
          # Add more columns and tests as you define the real table

      - name: raw_customers
        description: "Raw customer records extracted from the OLTP source."
        columns:
          - name: customer_id
            description: "Natural key from OLTP source."
            tests:
              - not_null

      - name: raw_products
        description: "Raw product records extracted from the OLTP source."
        columns:
          - name: product_id
            description: "Natural key from OLTP source."
            tests:
              - not_null
