version: 2

# =============================================================================
# _bronze_sources.yml
# Declares dbt sources that point to raw tables written by Python ingestion.
# Add one entry per OLTP table you load into bronze.
# =============================================================================

sources:
  - name: bronze
    description: >
      Raw data loaded by Python ingestion directly from OLTP source systems.
      No business transformations have been applied. dbt reads from here to
      build silver models.
    schema: bronze
    database: "{{ env_var('DBT_DATABASE', 'printtime_dw') }}"

    # Source freshness checks (optional — enable once tables exist)
    # freshness:
    #   warn_after:  {count: 6,  period: hour}
    #   error_after: {count: 24, period: hour}
    # loaded_at_field: _loaded_at

    tables:
      # ── Placeholder: OLTP tables ──────────────────
      - name: ref_state
        description: "ref_state table wich contains the states. extracted from the OLTP source."
        # loaded_at_field: _loaded_at
        columns:
          - name: state_code
            description: "Two-letter state code (natural key)."
            tests:
              - not_null

          - name: state_name
            description: "Full state name."
            tests:
              - not_null

          - name: bronze_record_id
            description: "Technical surrogate primary key for the Bronze row. Append-only; the source id may repeat across batches"
            tests:
              - not_null

          - name: bronze_batch_id
            description: "Identifies the ETL batch that loaded this row. Joins to audit.etl_batch_control.batch_key."
            tests:
              - not_null

          - name: bronze_loaded_at_timestamp
            description: "Timestamp when the row was written into Bronze (load time)."
            tests:
              - not_null

          - name: bronze_source_system
            description: "Source system identifier (e.g. oltp, 4over_csv, manual_file, reference)."
            tests:
              - not_null
              

          - name: bronze_row_hash
            description: "Deterministic hash of the business column values, used to detect changed rows across batches."
            tests:
              - not_null

          - name: bronze_is_deleted_flag
            description: "Marks a row that the source reports as deleted (soft-delete capture); does not remove the Bronze row."
            tests:
              - not_null

          - name: bronze_raw_payload_jsonb
            description: "Full raw source row stored as JSONB for complete traceability back to the exact extracted record."

      - name: oltp_product
        description: "Raw product records from the OLTP source (append-only)."
      
      - name: oltp_customer
        description: "Raw customer records from the OLTP source (append-only)."

      - name: oltp_department
        description: "Raw department lookup records from the OLTP source (append-only)."

      - name: oltp_product_category
        description: "Raw product-category lookup records from the OLTP source (append-only)."

      - name: oltp_employee
        description: "Raw employee records from the OLTP source (append-only)."

      - name: oltp_store
        description: "Raw store/location records from the OLTP source (append-only)."

      - name: ref_payment_method
        description: "Raw payment-method reference lookup (append-only)."

      - name: ref_payment_type
        description: "Raw payment-type reference lookup (append-only)."

      - name: ref_tax_rate
        description: "Raw tax-rate reference lookup (append-only)."

      - name: ref_invoice_status
        description: "Raw invoice-status reference lookup (append-only)."
            
              

          
         
      
