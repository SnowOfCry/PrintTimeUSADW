version: 2

# =============================================================================
# _silver_models.yml
# dbt model contracts for the silver layer. Each contract enforces the exact
# shape of sql/silver/002_create_silver_tables.sql: column names, data types,
# NOT NULL constraints, and the primary key. Columns are listed in QUERY order
# (the order the model's SELECT emits them), so silver_row_hash is always last.
#
# Every silver table shares the same NOT NULL set from the DDL spec:
#   <business key>, silver_source_system, silver_batch_id,
#   silver_created_at_timestamp, silver_updated_at_timestamp,
#   silver_is_deleted_flag, silver_row_hash.
# Add one model block per .sql file in this folder.
# =============================================================================

models:

  # ── silver.state ───────────────────────────────────────────────────────────
